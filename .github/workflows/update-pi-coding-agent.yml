name: "Update pi-coding-agent"

on:
  schedule:
    - cron: '0 * * * *'
  check_suite:
    types: [completed]
  workflow_dispatch: {}

jobs:
  update:
    # Run the update flow on schedule or manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release tag for earendil-works/pi
        id: get_release
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({ owner: 'earendil-works', repo: 'pi' });
            return release.data.tag_name;

      - name: Read current version from pkgs/pi-coding-agent.nix
        id: read_current
        run: |
          current=$(sed -n 's/^\s*version = "\([^"]*\)";$/\1/p' pkgs/pi-coding-agent.nix)
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Normalize release tag and compare
        id: compare
        run: |
          # strip leading 'v' if present
          tag="${{ steps.get_release.outputs.result }}"
          tag=${tag#v}
          echo "latest=$tag" >> $GITHUB_OUTPUT
          echo "Checking: current=${{ steps.read_current.outputs.current }} latest=$tag"
          if [ "${{ steps.read_current.outputs.current }}" = "$tag" ]; then
            echo "Up to date, nothing to do."
            exit 0
          fi

      - name: Create PR and attempt merge
        if: steps.compare.outputs.latest != steps.read_current.outputs.current
        uses: actions/github-script@v8
        env:
          LATEST: ${{ steps.compare.outputs.latest }}
          BASE: main
          PKG_PATH: pkgs/pi-coding-agent.nix
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const latest = process.env.LATEST;
            const base = process.env.BASE;
            const path = process.env.PKG_PATH;

            console.log(`Update controller running for ${owner}/${repo}, latest=${latest}`);

            const branch = `update/pi-coding-agent-v${latest}`;

            // Check for existing open PR for this branch
            const existingPRs = await github.rest.pulls.list({
              owner, repo, head: `${owner}:${branch}`, state: 'open', per_page: 1,
            });
            if (existingPRs.data.length > 0) {
              console.log(`Open PR already exists for ${branch}; nothing to do.`);
              return 'pr-exists';
            }

            // If branch exists without an open PR, it's stale — delete it
            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
              console.log(`Stale branch ${branch} found (no open PR); deleting.`);
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            // Download release tarball and compute sha256 base64
            const url = `https://github.com/earendil-works/pi/releases/download/v${latest}/pi-darwin-arm64.tar.gz`;
            console.log(`Downloading ${url}`);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Failed to download ${url}: ${res.status}`);
            const arrayBuf = await res.arrayBuffer();
            const buffer = Buffer.from(arrayBuf);
            const crypto = require('crypto');
            const digest = crypto.createHash('sha256').update(buffer).digest('base64');
            const newHash = `sha256-${digest}`;
            console.log(`Computed hash: ${newHash}`);

            // Read current file from base branch
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: base });
            if (!file?.data) throw new Error('Failed to read package file');
            const fileSha = file.data.sha;
            const content = Buffer.from(file.data.content, 'base64').toString('utf8');

            // Update version and hash
            let newContent = content.replace(/version = "[^"]+";/, `version = "${latest}";`);
            newContent = newContent.replace(/hash = "[^"]+";/, `hash = "${newHash}";`);

            if (newContent === content) {
              console.log('No changes detected after replacements; aborting.');
              return 'no-change';
            }

            // Create branch from base
            const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${base}` });
            try {
              await github.rest.git.createRef({
                owner, repo, ref: `refs/heads/${branch}`, sha: baseRef.data.object.sha,
              });
            } catch (err) {
              if (err.status === 422) {
                console.log('Branch already created by another run; aborting.');
                return 'branch-exists-concurrent';
              }
              throw err;
            }

            // Commit updated file
            const commitMessage = `chore(pi): bump pi-coding-agent to ${latest}`;
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, message: commitMessage,
              content: Buffer.from(newContent, 'utf8').toString('base64'),
              branch, sha: fileSha,
            });
            console.log(`Pushed updated file to branch ${branch}`);

            // Create PR
            const pr = await github.rest.pulls.create({
              owner, repo, title: commitMessage, head: branch, base,
              body: 'Automated update by GitHub Actions',
            });
            console.log(`Created PR #${pr.data.number}`);

            // Attempt immediate merge — succeeds when no checks are configured,
            // fails gracefully if checks are pending (check_suite:completed will
            // retry the merge when they finish).
            try {
              const mergeRes = await github.rest.pulls.merge({
                owner, repo, pull_number: pr.data.number, merge_method: 'merge',
              });
              console.log(`Merged PR #${pr.data.number}: ${mergeRes.data.sha}`);
            } catch (err) {
              console.log(`Merge not possible yet (checks may be pending): ${err.message}`);
            }

            return `updated: ${pr.data.number}`;

  merge:
    # Run the merge flow when a check suite completes
    if: github.event_name == 'check_suite'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge if checks passed
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const suite = context.payload.check_suite;
            const headBranch = suite.head_branch || '';

            // Only act on our update branches
            if (!headBranch.startsWith('update/pi-coding-agent-')) {
              console.log(`Ignoring branch ${headBranch}`);
              return;
            }

            console.log(`Check suite completed for ${headBranch} (conclusion: ${suite.conclusion})`);

            if (suite.conclusion !== 'success' && suite.conclusion !== 'neutral') {
              console.log(`Check suite not successful (${suite.conclusion}); skipping.`);
              return;
            }

            // Find the open PR for this branch
            const prs = suite.pull_requests || [];
            if (prs.length === 0) {
              console.log('No PRs associated with this check suite.');
              return;
            }

            for (const prRef of prs) {
              const pr = await github.rest.pulls.get({ owner, repo, pull_number: prRef.number });
              if (pr.data.state !== 'open') {
                console.log(`PR #${prRef.number} is ${pr.data.state}; skipping.`);
                continue;
              }

              // Verify no failing or in-progress check runs remain
              const headSha = pr.data.head.sha;
              const runs = await github.rest.checks.listForRef({ owner, repo, ref: headSha });
              const checkRuns = runs.data.check_runs || [];
              const failing = checkRuns.filter(r =>
                r.conclusion === 'failure' || r.conclusion === 'cancelled'
              );
              if (failing.length > 0) {
                console.log(`${failing.length} check(s) failed; skipping PR #${prRef.number}.`);
                continue;
              }
              const inProgress = checkRuns.filter(r => r.status !== 'completed');
              if (inProgress.length > 0) {
                console.log(`${inProgress.length} check(s) still running; skipping PR #${prRef.number}.`);
                continue;
              }

              try {
                const mergeRes = await github.rest.pulls.merge({
                  owner, repo, pull_number: prRef.number, merge_method: 'merge',
                });
                console.log(`Merged PR #${prRef.number}: ${mergeRes.data.sha}`);
              } catch (err) {
                console.log(`Failed to merge PR #${prRef.number}: ${err.message}`);
              }
            }
