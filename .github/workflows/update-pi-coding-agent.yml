name: "Update pi-coding-agent"

on:
  schedule:
    # hourly check
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release tag for earendil-works/pi
        id: get_release
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({ owner: 'earendil-works', repo: 'pi' });
            return release.data.tag_name;

      - name: Read current version from pkgs/pi-coding-agent.nix
        id: read_current
        run: |
          current=$(sed -n 's/^\s*version = "\([^"]*\)";$/\1/p' pkgs/pi-coding-agent.nix)
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Normalize release tag and compare
        id: compare
        run: |
          # strip leading 'v' if present
          tag="${{ steps.get_release.outputs.result }}"
          tag=${tag#v}
          echo "latest=$tag" >> $GITHUB_OUTPUT
          echo "Checking: current=${{ steps.read_current.outputs.current }} latest=$tag"
          if [ "${{ steps.read_current.outputs.current }}" = "$tag" ]; then
            echo "Up to date, nothing to do."
            exit 0
          fi

      - name: "Controller: download, update file, create PR, enable auto-merge"
        if: ${{ steps.compare.outputs.latest != steps.read_current.outputs.current }}
        uses: actions/github-script@v8
        env:
          LATEST: ${{ steps.compare.outputs.latest }}
          BASE: main
          PKG_PATH: pkgs/pi-coding-agent.nix
        with:
          script: |
            const owner = github.context?.repo?.owner || (process.env.GITHUB_REPOSITORY || '').split('/')[0];
            const repo = github.context?.repo?.repo || (process.env.GITHUB_REPOSITORY || '').split('/')[1];
            const latest = process.env.LATEST;
            const base = process.env.BASE;
            const path = process.env.PKG_PATH;

            console.log(`Update controller running for ${owner}/${repo}, latest=${latest}`);

            // Build branch name
            const branch = `update/pi-coding-agent-v${latest}`;

            // Check for existing open PR for this head
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${branch}`, state: 'open', per_page: 1 });
            if (prs.data && prs.data.length > 0) {
              console.log(`Open PR already exists for ${branch}; nothing to do.`);
              return 'pr-exists';
            }

            // Check if branch already exists
            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
              console.log(`Branch ${branch} already exists; nothing to do.`);
              return 'branch-exists';
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            // Download release tarball and compute sha256 base64
            const url = `https://github.com/earendil-works/pi/releases/download/v${latest}/pi-darwin-arm64.tar.gz`;
            console.log(`Downloading ${url}`);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Failed to download ${url}: ${res.status}`);
            const arrayBuf = await res.arrayBuffer();
            const buffer = Buffer.from(arrayBuf);
            const crypto = require('crypto');
            const digest = crypto.createHash('sha256').update(buffer).digest('base64');
            const newHash = `sha256-${digest}`;
            console.log(`Computed hash: ${newHash}`);

            // Read current file from base branch
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: base });
            if (!file || !file.data) throw new Error('Failed to read package file');
            const fileSha = file.data.sha;
            const content = Buffer.from(file.data.content, 'base64').toString('utf8');

            // Update version and hash in the file content
            let newContent = content.replace(/version = \"[^\"]+\";/, `version = \"${latest}\";`);
            newContent = newContent.replace(/hash = \"[^\"]+\";/, `hash = \"${newHash}\";`);

            if (newContent === content) {
              console.log('No changes detected in file content after replacements; aborting.');
              return 'no-change';
            }

            // Create new branch from base
            const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${base}` });
            const baseSha = baseRef.data.object.sha;
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: baseSha });
            } catch (err) {
              if (err.status === 422) {
                console.log('Branch already created by another run; aborting.');
                return 'branch-exists-concurrent';
              }
              throw err;
            }

            // Commit updated file to new branch
            const contentB64 = Buffer.from(newContent, 'utf8').toString('base64');
            const commitMessage = `chore(pi): bump pi-coding-agent to ${latest}`;
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, message: commitMessage, content: contentB64, branch, sha: fileSha });
            console.log(`Pushed updated file to branch ${branch}`);

            // Create PR
            const pr = await github.rest.pulls.create({ owner, repo, title: commitMessage, head: branch, base, body: 'Automated update by GitHub Actions' });
            console.log(`Created PR #${pr.data.number}`);

            // Check whether there are any check runs for this commit. If none, trigger the merge-on-green workflow
            const headSha = pr.data.head.sha;
            const checks = await github.rest.checks.listForRef({ owner, repo, ref: headSha });
            const checkRuns = checks.data.check_runs || [];

            // Also inspect combined status
            const combined = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: headSha });
            const combinedState = combined.data.state; // 'success', 'pending', 'failure', 'error'

            if (checkRuns.length === 0) {
              console.log(`No check-runs found for ${headSha}. Attempting to merge PR #${pr.data.number} directly.`);
              try {
                const mergeRes = await github.rest.pulls.merge({ owner, repo, pull_number: pr.data.number, merge_method: 'merge' });
                console.log(`Merged PR #${pr.data.number}: ${mergeRes.data.sha}`);
              } catch (err) {
                // Merge can fail due to branch protection, conflicts, etc. Log and continue.
                console.log(`Direct merge attempt failed for PR #${pr.data.number}: ${err}`);
              }
            } else {
              console.log(`Found ${checkRuns.length} check-runs for ${headSha}; merge-on-green will act on check_suite.completed events.`);
            }

            return `updated: ${pr.data.number}`;
