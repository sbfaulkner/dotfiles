name: "Merge update PRs on green"

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process (optional)'
        required: false
      head_sha:
        description: 'Commit SHA to check (optional)'
        required: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge update PRs if checks passed
        uses: actions/github-script@v8
        with:
          script: |
            const owner = github.context.repo.owner;
            const repo = github.context.repo.repo;

            // Determine the event type and head SHA
            let headSha = null;
            let prs = [];

            if (github.context.eventName === 'pull_request' && github.event.action === 'labeled') {
              // Labeled event: get the PR directly
              const prNumber = github.event.pull_request.number;
              headSha = github.event.pull_request.head.sha;
              console.log(`Label event for PR #${prNumber}, head ${headSha}`);

              // Fetch PR details to examine labels and head ref
              const prRes = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              prs = [prRes.data];
            } else {
              // Fallback: check_suite or other events with a head SHA
              headSha = github.event.check_suite?.head_sha || github.inputs?.head_sha;
              if (!headSha) {
                console.log('No head SHA found on event; nothing to do.');
                return;
              }

              console.log(`Checks completed for commit ${headSha}`);

              // List PRs associated with this commit
              const prsRes = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: headSha });
              prs = prsRes.data || [];
              if (prs.length === 0) {
                console.log('No PRs associated with commit, nothing to do.');
                return;
              }
            }

            for (const pr of prs) {
              const prNumber = pr.number;
              const headRef = pr.head.ref;
              console.log(`Found PR #${prNumber} for head ref ${headRef}`);

              // Require explicit 'merge-on-green' label to opt-in to auto-merge
              const labels = (pr.labels || []).map(l => l.name);
              const hasMergeOnGreenLabel = labels.includes('merge-on-green');
              if (!hasMergeOnGreenLabel) {
                console.log(`Skipping PR #${prNumber}: missing 'merge-on-green' label.`);
                continue;
              }

              // Double-check combined status is successful
              const combined = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: headSha });
              if (combined.data.state !== 'success') {
                console.log(`Checks not all successful for ${headSha} (state=${combined.data.state}); skipping PR #${prNumber}.`);
                continue;
              }

              // Optional: check there are no failing check-runs
              const runs = await github.rest.checks.listForRef({ owner, repo, ref: headSha });
              if ((runs.data.check_runs || []).some(r => r.conclusion === 'failure' || r.conclusion === 'cancelled')) {
                console.log(`Some checks failed for ${headSha}; skipping PR #${prNumber}.`);
                continue;
              }

              // Attempt the merge (merge_method: merge)
              try {
                const mergeRes = await github.rest.pulls.merge({ owner, repo, pull_number: prNumber, merge_method: 'merge' });
                console.log(`Merged PR #${prNumber}: ${mergeRes.data.sha}`);
              } catch (err) {
                console.log(`Failed to merge PR #${prNumber}: ${err}`);
              }
            }
